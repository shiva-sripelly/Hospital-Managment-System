server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location ~ ^/(auth|patients|doctors|appointments|billing|bills|medicines|medicine-sales|inventory|staff|payroll|reports|audit-logs|ai|prescriptions|lab-tests|medical-records|notifications|dashboard|users)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(docs|openapi.json|health)$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
